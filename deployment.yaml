apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deploy
spec:
  replicas: 10
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: u6t65k6/docker-fastapi:52c5171ba8de0cb4388b6c52b49f0eb9428460cb
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
