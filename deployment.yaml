apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deploy
spec:
  replicas: 10
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: u6t65k6/docker-fastapi:70bd8f89f197865ef34627d7c6824031faa502ef
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
