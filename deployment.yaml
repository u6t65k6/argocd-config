apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deploy
spec:
  replicas: 10
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: u6t65k6/docker-fastapi:5c94405ed268044de16077f2d401808ab542c5ae
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
