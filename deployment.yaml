apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deploy
spec:
  replicas: 10
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: u6t65k6/docker-fastapi:5f94f0c579811bba19bb3443314ac34a76048b21
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
